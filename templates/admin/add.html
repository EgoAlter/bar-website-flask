{% extends "admin/layout.html" %}
{% block title %}Add Item — Mad House Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="fw-bold mb-4">Add Menu Item</h1>
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Price (£)</label>
                    <input type="number" name="price" step="0.01" min="0" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="cocktails">Cocktails</option>
                        <option value="sharer_food">Sharer Food</option>
                        <option value="soft_drinks">Soft Drinks</option>
                        <option value="bottomless_brunch">Bottomless Brunch</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Venue</label>
                    <select name="venue" class="form-select" required>
                        <option value="pink_lane">Pink Lane</option>
                        <option value="dean_street">Dean Street</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Add Item</button>
                    <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
