<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mad House Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% if session.admin_logged_in %}
    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-danger">
        <div class="container">
            <a class="navbar-brand fw-bold text-danger" href="/admin/dashboard">⚡ Mad House Admin</a>
            <div class="d-flex gap-3 align-items-center">
                <a href="/admin/menu/add" class="btn btn-sm btn-danger">+ Add Item</a>
                <a href="/admin/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container py-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
