{% extends "admin/layout.html" %}
{% block title %}Edit Item — Mad House Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="fw-bold mb-4">Edit Menu Item</h1>
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" class="form-control" value="{{ item.description }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Price (£)</label>
                    <input type="number" name="price" step="0.01" min="0" class="form-control" value="{{ item.price }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="cocktails" {{ 'selected' if item.category == 'cocktails' }}>Cocktails</option>
                        <option value="sharer_food" {{ 'selected' if item.category == 'sharer_food' }}>Sharer Food</option>
                        <option value="soft_drinks" {{ 'selected' if item.category == 'soft_drinks' }}>Soft Drinks</option>
                        <option value="bottomless_brunch" {{ 'selected' if item.category == 'bottomless_brunch' }}>Bottomless Brunch</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Venue</label>
                    <select name="venue" class="form-select" required>
                        <option value="pink_lane" {{ 'selected' if item.venue == 'pink_lane' }}>Pink Lane</option>
                        <option value="dean_street" {{ 'selected' if item.venue == 'dean_street' }}>Dean Street</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Save Changes</button>
                    <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
